# mai-chu 分表视频生成器 - Docker Compose 配置
# 一键启动 Web 服务，通过端口映射即可访问
# 部署后访问: http://<服务器IP或域名>:8501

services:
  mai-gen-video:
    build: .
    container_name: mai-gen-videob50
    ports:
      # 将容器 8501 映射到主机，访问 http://<主机IP>:8501
      - "8501:8501"
    volumes:
      # 持久化数据：数据库、凭证、生成的视频
      - ./data/db:/app/db_data
      - ./data/cred_datas:/app/cred_datas
      - ./data/videos:/app/videos
      - ./data/user_config:/root/.mai-gen-videob50
      # 持久化全局配置（首次运行会自动创建），可在 Web 系统设置中修改
      - ./data/config:/app/config
    environment:
      # 数据库路径（持久化到 db_data 卷）
      - MAI_DB_PATH=/app/db_data/mai_gen_videob50.db
      # 可选：设置代理（如需访问 YouTube/B站）
      # - HTTP_PROXY=http://host.docker.internal:7890
      # - HTTPS_PROXY=http://host.docker.internal:7890
      - TZ=Asia/Shanghai
    restart: unless-stopped
