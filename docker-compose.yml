# mai-chu 分表视频生成器 - Docker Compose 配置
# 一键启动 Web 服务，通过端口映射即可访问
# 部署后访问: http://<服务器IP或域名>:8501

services:
  mai-gen-video:
    build: .
    container_name: mai-gen-videob50
    ports:
      # 默认仅本机可访问；需公网时改为 "8501:8501"
      - "127.0.0.1:8501:8501"
    volumes:
      # 持久化数据目录：/www/maigen
      - /www/maigen/db:/app/db_data
      - /www/maigen/cred_datas:/app/cred_datas
      - /www/maigen/videos:/app/videos
      - /www/maigen/b50_datas:/app/b50_datas
      - /www/maigen/static_user:/app/static/user
      - /www/maigen/user_config:/root/.mai-gen-videob50
      - /www/maigen/config:/app/config
    environment:
      # 数据库路径（持久化到 db_data 卷）
      - MAI_DB_PATH=/app/db_data/mai_gen_videob50.db
      # 可选：设置代理（如需访问 YouTube/B站）
      # - HTTP_PROXY=http://host.docker.internal:7890
      # - HTTPS_PROXY=http://host.docker.internal:7890
      - TZ=Asia/Shanghai
    restart: unless-stopped
